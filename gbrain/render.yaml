# Render Blueprint for the gbrain company brain (bridge over the gbrain CLI).
#
# Deploy: Render → New → Blueprint, pick this file (or create a Docker web
# service manually with Root Directory = `gbrain`). The Next.js app (Vercel) and
# hocuspocus (Render) reach it via GBRAIN_BRIDGE_URL=https://<service>.onrender.com
#
# Backing store: Supabase Postgres + pgvector (set DATABASE_URL below). On
# Postgres the PGLite single-writer lock is gone, so concurrent access is fine.
services:
  - type: web
    name: gbrain
    runtime: docker
    rootDir: gbrain
    dockerfilePath: ./Dockerfile
    plan: free # no persistent disk (disks need a paid plan). The brain lives in
    # Postgres, so nothing is lost: config.json is recreated on each cold start
    # and `apply-migrations` is idempotent. Note: free web services sleep after
    # ~15 min idle and cold-start in ~1 min. Bump to `starter` (+ a disk) for
    # always-on.
    healthCheckPath: /health
    envVars:
      # Supabase connection string — click "Connect" in the dashboard and copy
      # the pooler URI. gbrain runs as a persistent server, so use the SESSION
      # pooler (port 5432); it supports prepared statements (no ?prepare=false).
      #   postgresql://postgres.<ref>:<pwd>@aws-<n>-<region>.pooler.supabase.com:5432/postgres
      # (If you use the transaction pooler at :6543 instead, append ?prepare=false.)
      - key: DATABASE_URL
        sync: false
      # Embedding + chat key (Gemini AI Studio key; reused for embeddings).
      - key: GEMINI_API_KEY
        sync: false
      # Shared secret the app + hocuspocus send as `Authorization: Bearer`.
      # Set the SAME value here and in web (Vercel) + hocuspocus (Render).
      - key: GBRAIN_BRIDGE_TOKEN
        sync: false
