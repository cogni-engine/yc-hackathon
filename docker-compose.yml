# Local one-shot stack: realtime server + Next.js app.
#   docker compose up --build
# Then open http://localhost:3000 (open two tabs to collaborate).
services:
  hocuspocus:
    build: ./hocuspocus
    ports:
      - "1234:1234"

  web:
    build:
      context: .
      args:
        # Baked into the client bundle; the browser dials this from the host.
        NEXT_PUBLIC_HOCUSPOCUS_URL: ws://localhost:1234
    ports:
      - "3000:3000"
    # Server-side runtime env (GEMINI_API_KEY, GEMINI_MODEL) for /api/ai.
    # NEXT_PUBLIC_* in here is ignored at runtime (already baked at build).
    env_file:
      - .env.local
    depends_on:
      - hocuspocus
