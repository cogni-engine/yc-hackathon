# Local one-shot stack: gbrain + realtime server + Next.js app.
#   docker compose up --build
# Then open http://localhost:3000 (create a user, then a note).
# gbrain bridge → http://localhost:3131 (/health, /write, /query — a thin HTTP
# wrapper over the gbrain CLI; see gbrain/bridge.ts).
services:
  gbrain:
    build: ./gbrain
    ports:
      - "3131:3131"
    # OPENAI_API_KEY (or VOYAGE_API_KEY / ZEROENTROPY_API_KEY) for embeddings.
    env_file:
      - .env.local
    # Persist the local PGLite brain + config across restarts.
    volumes:
      - gbrain-data:/root/.gbrain

  hocuspocus:
    build: ./hocuspocus
    ports:
      - "1234:1234"
    # SUPABASE_URL / SUPABASE_ANON_KEY for note persistence.
    env_file:
      - .env.local
    # Reach the gbrain bridge by its compose service name to mirror notes.
    environment:
      GBRAIN_BRIDGE_URL: http://gbrain:3131
    depends_on:
      - gbrain

  web:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* are baked into the client bundle at build time.
        NEXT_PUBLIC_HOCUSPOCUS_URL: ws://localhost:1234
        # Public client values (also shipped in the browser bundle).
        NEXT_PUBLIC_SUPABASE_URL: https://bkqjlxozcflgtasgfqjy.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_9hwMpN3fze6m_qrDFHXRtw_sZVwqOd8
    ports:
      - "3000:3000"
    # Server-side runtime env (GEMINI_API_KEY, GEMINI_MODEL) for /api/ai.
    env_file:
      - .env.local
    # /api/ai and /api/gbrain reach the bridge by its compose service name.
    environment:
      GBRAIN_BRIDGE_URL: http://gbrain:3131
    depends_on:
      - hocuspocus
      - gbrain

volumes:
  gbrain-data:
