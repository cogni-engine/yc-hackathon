# Render Blueprint for the realtime collaboration server (hocuspocus).
# Only THIS server goes to Render; the Next.js app deploys to Vercel and points
# at it via NEXT_PUBLIC_HOCUSPOCUS_URL=wss://<service>.onrender.com
#
# Deploy: push this repo, then in Render → New → Blueprint, select this file
# (set the Root Directory to `hocuspocus` if creating the service manually).
services:
  - type: web
    name: canvas-hocuspocus
    runtime: node
    rootDir: hocuspocus
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: '20'
